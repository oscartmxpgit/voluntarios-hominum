<div class="calendar-container">
  <full-calendar [options]="calendarOptions"></full-calendar>

  @if (isFormVisible) {
    <div class="modal-overlay">
      <app-event-form 
        [eventData]="selectedEvent" 
        (close)="closeForm()"
        (delete)="handleDeleteEvent($event)">
      </app-event-form>
    </div>
  }
</div>
