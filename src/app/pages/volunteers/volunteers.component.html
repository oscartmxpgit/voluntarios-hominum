<main class="volunteers-page">
  <header class="page-header">
    <h1>Gestión de Usuarios</h1>
    <button class="btn-primary" (click)="openCreateModal()">➕ Nuevo Usuario</button>
  </header>

  @if (showForm) {
    <section class="form-card">
      <h3>Registrar Nuevo Usuario</h3>
      <div class="form-group">
        <label>Email del usuario</label>
        <input type="email" [(ngModel)]="newEmail" placeholder="ejemplo@correo.com">
      </div>
      <div class="form-actions">
        <button class="btn-secondary" (click)="showForm = false">Cancelar</button>
        <button class="btn-save" (click)="createVolunteer()">Registrar</button>
      </div>
    </section>
  }

  @if (loading) {
    <div class="loader-state">Cargando...</div>
  } @else {
    <section class="table-container">
      <table class="volunteers-table">
        <thead>
          <tr>
            <th>Email</th>
            <th>Rol</th>
            <th class="text-center">Acciones</th>
          </tr>
        </thead>
        <tbody>
          @for (v of volunteers; track v.id) {
            <tr>
              <td>{{ v.email }}</td>
              <td>
                <span class="badge" [class.coordinator]="v.is_coordinator === 1">
                  {{ v.is_coordinator === 1 ? 'Coordinador' : 'Voluntario' }}
                </span>
              </td>
              <td class="text-center">
                @if (v.is_coordinator === 0) {
                  <button class="btn-delete" (click)="deleteUser(v)">🗑️ Eliminar</button>
                } @else {
                  <span class="no-action">Protegido</span>
                }
              </td>
            </tr>
          }
        </tbody>
      </table>
    </section>
  }
</main>
