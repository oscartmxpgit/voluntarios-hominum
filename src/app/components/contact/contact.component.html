<section id="contact-section" class="contact">
  <h2>Contacto</h2>
  <p>Rellena el formulario y nos pondremos en contacto contigo.</p>

  <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="contact-form">
    
    <div class="form-group">
      <label for="name">Nombre completo *</label>
      <input type="text" id="name" formControlName="name" placeholder="Tu nombre">
      <small class="error" *ngIf="contactForm.get('name')?.invalid && contactForm.get('name')?.touched">
        Mínimo 3 caracteres.
      </small>
    </div>

    <div class="form-group">
      <label for="email">Correo electrónico *</label>
      <input type="email" id="email" formControlName="email" placeholder="ejemplo@correo.com">
      <small class="error" *ngIf="contactForm.get('email')?.invalid && contactForm.get('email')?.touched">
        Introduce un email válido.
      </small>
    </div>

    <div class="form-group">
      <label for="phone">Teléfono (opcional)</label>
      <input type="tel" id="phone" formControlName="phone" placeholder="600 000 000">
    </div>

    <div class="form-group">
      <label for="message">Mensaje *</label>
      <textarea id="message" formControlName="message" rows="5" placeholder="¿Cómo te gustaría colaborar?"></textarea>
      <small class="error" *ngIf="contactForm.get('message')?.invalid && contactForm.get('message')?.touched">
        El mensaje debe tener al menos 10 caracteres.
      </small>
    </div>

    <button type="submit" [disabled]="contactForm.invalid" class="submit-btn">
      {{ contactForm.invalid ? 'Completa los campos requeridos' : 'Enviar Mensaje' }}
    </button>
  </form>
</section>
